<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Time</title>
 <link rel="shortcut icon" href="https://previews.123rf.com/images/jovanas/jovanas1606/jovanas160600377/58893843-quiz-icon.jpg" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="card" class="animate">
  
    <!-- Screen 1: Start Page -->
    <div id="start-screen">
      <h1>Quiz Time</h1>
      <p>বাংলাদেশ সম্পর্কে তোমার জ্ঞান যাচাই করো</p>
      <button onclick="startQuiz()">কুইজ শুরু করুন</button>
    </div>
  
  <!-- Screen 2: Question Page -->
  <div id="quiz-screen" style="display:none;">
  
    <!-- Question counter and score -->
    <div id="quiz-header">
      <p id="q-counter"></p>
      <p id="timer">⏱ ৩০</p>
      <p id="score-display">স্কোর: ০</p>
    </div>
  
    <!-- Progress bar -->
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  
    <h2 id="question-text"></h2>
    <div id="options"></div>
    <p id="feedback"></p>
    <button id="next-btn" style="display:none;" onclick="nextQuestion()">পরবর্তী →</button>
  
  </div>
  
    <!-- Screen 3: Result Page -->
    <div id="result-screen" style="display:none;">
      <p id="result-emoji"></p>
      <h2 id="result-title"></h2>
      <p id="result-score"></p>
      <p id="result-sub"></p>
      <button id="next-round-btn" onclick="restartQuiz()">পরের রাউন্ড →</button>
      <button onclick="restartQuiz()">আবার খেলুন</button>
      <button onclick="goHome()">হোম</button>
    </div>

    
  
  </div>

  <script src="app.js"></script>
</body>

</html>

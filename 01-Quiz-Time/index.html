<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Time</title>
 <link rel="shortcut icon" href="https://previews.123rf.com/images/jovanas/jovanas1606/jovanas160600377/58893843-quiz-icon.jpg" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="card">

    <!-- Screen 1: Start Page -->
    <div id="start-screen">
      <h1>Quiz Time 🇧🇩</h1>
      <p>বাংলাদেশ সম্পর্কে তোমার জ্ঞান যাচাই করো</p>
      <button>কুইজ শুরু করুন</button>
    </div>

    <!-- Screen 2: Question Page -->
    <div id="quiz-screen">
      <p id="q-counter">প্রশ্ন ১ / ৮</p>
      <h2 id="question-text">এখানে প্রশ্ন আসবে</h2>
      <div id="options">
        <!-- Answer buttons will be added here by JavaScript -->
      </div>
      <p id="feedback"></p>
      <button id="next-btn">পরবর্তী →</button>
    </div>

    <!-- Screen 3: Result Page -->
    <div id="result-screen">
      <p id="result-emoji">🏆</p>
      <h2 id="result-title">অসাধারণ!</h2>
      <p id="result-score">৮ / ৮</p>
      <p id="result-sub">তুমি সব প্রশ্নের উত্তর দিয়েছ!</p>
      <button>আবার খেলুন</button>
      <button>হোম</button>
    </div>

  </div>
</body>

</html>

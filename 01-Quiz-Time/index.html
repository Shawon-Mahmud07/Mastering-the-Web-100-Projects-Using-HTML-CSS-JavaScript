<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Time</title>
 <link rel="shortcut icon" href="https://previews.123rf.com/images/jovanas/jovanas1606/jovanas160600377/58893843-quiz-icon.jpg" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="card">
  
    <!-- Screen 1: Start Page -->
    <div id="start-screen">
      <h1>Quiz Time 🇧🇩</h1>
      <p>বাংলাদেশ সম্পর্কে তোমার জ্ঞান যাচাই করো</p>
      <button onclick="startQuiz()">কুইজ শুরু করুন</button>
    </div>
  
    <!-- Screen 2: Question Page -->
    <div id="quiz-screen" style="display:none;">
      <p id="q-counter"></p>
      <h2 id="question-text"></h2>
      <div id="options"></div>
      <p id="feedback"></p>
      <button id="next-btn" style="display:none;" onclick="nextQuestion()">পরবর্তী →</button>
    </div>
  
    <!-- Screen 3: Result Page -->
    <div id="result-screen" style="display:none;">
      <p id="result-emoji"></p>
      <h2 id="result-title"></h2>
      <p id="result-score"></p>
      <p id="result-sub"></p>
      <button>আবার খেলুন</button>
      <button>হোম</button>
    </div>
  
  </div>

  <script src="app.js"></script>
</body>

</html>
